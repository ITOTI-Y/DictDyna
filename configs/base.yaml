seed: 42
device: auto

dictionary:
  n_atoms: 128
  sparsity_lambda: 0.1
  pretrain_epochs: 100
  pretrain_lr: 1e-3
  slow_update_lr: 1e-5

encoder:
  shared_hidden_dims: [256, 256]
  adapter_dim: 64
  activation: relu
  sparsity_method: topk
  topk_k: 16

dyna:
  rollout_horizon: 3
  rollouts_per_step: 10
  model_to_real_ratio: 0.5
  model_update_freq: 1

sac:
  actor_lr: 3e-4
  critic_lr: 3e-4
  alpha_lr: 3e-4
  hidden_dims: [256, 256]
  tau: 0.005
  autotune_alpha: true
  initial_alpha: 0.2

training:
  total_timesteps: 105120  # 3 episodes (3 years, 15-min steps: 35040/year)
  eval_freq: 35040  # evaluate after each full episode
  n_eval_episodes: 3
  log_interval: 100
  save_freq: 8760
  batch_size: 256
  buffer_size: 100000
  gamma: 0.99

reward:
  comfort_weight: 0.5
  temp_target: 23.0
  temp_band: 2.0

wandb:
  project: dictdyna
  entity: null
  tags: []
