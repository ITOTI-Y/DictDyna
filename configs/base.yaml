seed: 42
device: auto

dictionary:
  n_atoms: 128
  sparsity_lambda: 0.1
  pretrain_epochs: 100
  pretrain_lr: 1e-3
  slow_update_lr: 1e-5

encoder:
  shared_hidden_dims: [256, 256]
  adapter_dim: 64
  activation: relu
  sparsity_method: topk
  topk_k: 16
  use_layernorm: true
  soft_topk_temperature: 1.0
  soft_topk_anneal_steps: 50000

wm_loss:
  use_dim_weighting: true
  dim_weight_ema_decay: 0.99
  identity_penalty_lambda: 0.5
  grad_clip_norm: 1.0
  grad_clip_dict_norm: 0.1
  reward_dim_indices: [9, 15]
  reward_dim_weight: 1.5
  probabilistic: false
  uncertainty_penalty: 1.0

dyna:
  rollout_horizon: 1
  rollouts_per_step: 10
  model_to_real_ratio: 0.2
  model_update_freq: 1
  rollout_start_step: 5000
  multistep_horizon: 3
  multistep_discount: 0.95
  teacher_forcing_ratio: 0.5
  use_mve: false
  mve_horizon: 3
  multistep_curriculum: true
  multistep_curriculum_schedule: [1, 2, 3, 5]
  multistep_curriculum_steps: [0, 10000, 30000, 60000]
  scheduled_sampling_start: 1.0
  scheduled_sampling_end: 0.0
  scheduled_sampling_steps: 50000

sac:
  actor_lr: 3e-4
  critic_lr: 3e-4
  alpha_lr: 3e-4
  hidden_dims: [256, 256]
  tau: 0.005
  autotune_alpha: true
  initial_alpha: 0.2

training:
  total_timesteps: 105120  # 3 episodes (3 years, 15-min steps: 35040/year)
  eval_freq: 35040  # evaluate after each full episode
  n_eval_episodes: 3
  log_interval: 100
  save_freq: 8760
  batch_size: 256
  buffer_size: 100000
  gamma: 0.99

reward:
  comfort_weight: 0.5
  temp_target: 23.0
  temp_band: 2.0

wandb:
  project: dictdyna
  entity: null
  tags: []
