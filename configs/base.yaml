seed: 42
device: auto

paths:
  results_dir: output/results
  pretrained_dir: output/pretrained
  checkpoint_dir: output/checkpoints
  figures_dir: output/figures
  data_dir: data/offline_rollouts
  diffs_dir: data/processed/state_diffs

defaults:
  dict_path: output/pretrained/dict_k128.pt
  buildings:
    - env_name: "Eplus-5zone-hot-continuous-v1"
      building_id: "office_hot"
    - env_name: "Eplus-5zone-mixed-continuous-v1"
      building_id: "office_mixed"
    - env_name: "Eplus-5zone-cool-continuous-v1"
      building_id: "office_cool"
  source_buildings:
    - env_name: "Eplus-5zone-hot-continuous-v1"
      building_id: "office_hot"
    - env_name: "Eplus-5zone-mixed-continuous-v1"
      building_id: "office_mixed"
  target_building:
    env_name: "Eplus-5zone-cool-continuous-v1"
    building_id: "office_cool"

dictionary:
  n_atoms: 128
  sparsity_lambda: 0.1
  pretrain_epochs: 100
  pretrain_lr: 1e-3
  slow_update_lr: 1e-5

encoder:
  shared_hidden_dims: [256, 256]
  adapter_dim: 64
  activation: relu
  sparsity_method: topk
  topk_k: 16
  use_layernorm: true
  soft_topk_temperature: 1.0
  soft_topk_anneal_steps: 50000

wm_loss:
  use_dim_weighting: true
  dim_weight_ema_decay: 0.99
  identity_penalty_lambda: 0.5
  grad_clip_norm: 1.0
  grad_clip_dict_norm: 0.1

dyna:
  rollout_horizon: 1
  rollouts_per_step: 10
  model_to_real_ratio: 0.2
  model_update_freq: 1
  rollout_start_step: 5000
  multistep_horizon: 1
  multistep_discount: 0.95
  teacher_forcing_ratio: 0.5
  use_mve: false
  mve_horizon: 3

sac:
  actor_lr: 3e-4
  critic_lr: 3e-4
  alpha_lr: 3e-4
  hidden_dims: [256, 256]
  tau: 0.005
  autotune_alpha: true
  initial_alpha: 0.2

training:
  total_timesteps: 105120  # 3 episodes (3 years, 15-min steps: 35040/year)
  eval_freq: 35040  # evaluate after each full episode
  n_eval_episodes: 3
  log_interval: 100
  save_freq: 8760
  batch_size: 256
  buffer_size: 100000
  gamma: 0.99

reward:
  comfort_weight: 0.5
  temp_target: 23.0
  temp_band: 2.0

wandb:
  project: dictdyna
  entity: null
  tags: []
